site_name: PiShield Documentation
site_description: A PyTorch Package for Learning with Requirements
site_url: https://mihaela-stoian.github.io/PiShield/docs/
repo_url: https://github.com/mihaela-stoian/PiShield
repo_name: mihaela-stoian/PiShield
edit_uri: edit/main/docs/

# Clicking the logo / site title in the header returns to the PiShield landing
# page (the docs live under /PiShield/docs/, the landing page at /PiShield/).
extra:
  homepage: https://mihaela-stoian.github.io/PiShield/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - toc.follow
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            docstring_section_style: table
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            heading_level: 2
            merge_init_into_class: true
            filters: ["!^_"]

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets

nav:
  - Home: index.md
  - "← PiShield site": https://mihaela-stoian.github.io/PiShield/
  - API Reference:
      - Overview: api/index.md
      - Shield Layer & Memory-efficient Loss: api/core.md
      - Hierarchical requirements: api/hierarchical.md
      - Propositional requirements: api/propositional.md
      - Linear requirements: api/linear.md
      - QFLRA requirements: api/qflra.md
