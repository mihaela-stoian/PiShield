site_name: PiShield
site_description: A NeSy Framework for Learning with Requirements
site_url: https://mihaela-stoian.github.io/PiShield/
repo_url: https://github.com/mihaela-stoian/PiShield
repo_name: mihaela-stoian/PiShield
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - toc.follow
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            docstring_section_style: table
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            heading_level: 2
            merge_init_into_class: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets

nav:
  - Home: index.md
  - API Reference:
      - Overview: api/index.md
      - Shield Layer & Shield Loss: api/core.md
      - Linear requirements: api/linear.md
      - QFLRA requirements: api/qflra.md
      - Propositional requirements: api/propositional.md
