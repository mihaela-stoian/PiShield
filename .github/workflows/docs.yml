name: Deploy documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt
          # Install the package so mkdocstrings can import it for the API reference.
          pip install -e .
      - name: Build site
        # We do not use `--strict` because this codebase is intentionally not
        # fully type-annotated, which makes griffe emit hundreds of benign
        # "No type or annotation for parameter/return" warnings. Instead we fail
        # the build on any *other* warning or error (broken links, bad
        # cross-references, import failures).
        run: |
          set -o pipefail
          mkdocs build --site-dir _site 2>&1 | tee build.log
          if grep -E "WARNING|ERROR" build.log | grep -vE "No type or annotation" | grep -q .; then
            echo "::error::Unexpected documentation warnings (see above)"
            exit 1
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
